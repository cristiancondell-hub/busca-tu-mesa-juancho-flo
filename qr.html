<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR - Busca tu mesa</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: #292929;
        color: #f7f4ef;
        font-family: Avenir, "Century Gothic", system-ui, sans-serif;
      }
      main {
        width: min(100%, 34rem);
        text-align: center;
      }
      h1 {
        margin: 0 0 1.5rem;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.2rem, 10vw, 4rem);
        font-weight: 400;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .card {
        display: grid;
        gap: 1rem;
        border-radius: 0.8rem;
        background: #d7d7d7;
        color: #111;
        padding: 1.25rem;
      }
      input {
        width: 100%;
        border: 0;
        border-radius: 0.55rem;
        padding: 0.9rem 1rem;
        font: inherit;
        font-size: 1rem;
      }
      img {
        width: min(100%, 18rem);
        aspect-ratio: 1;
        justify-self: center;
        border: 1rem solid #fff;
        background: #fff;
      }
      p {
        margin: 0;
        color: #555;
        line-height: 1.45;
      }
      @media print {
        body { background: #fff; color: #111; }
        .card { box-shadow: none; }
        input, p { display: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Busca tu mesa</h1>
      <section class="card">
        <input id="urlInput" type="url" aria-label="URL de la app">
        <img id="qrImage" alt="Código QR para abrir la app">
        <p>Cuando la app esté publicada, pega aquí la URL final. El QR se actualiza solo y queda listo para imprimir.</p>
      </section>
    </main>
    <script>
      const input = document.querySelector("#urlInput");
      const image = document.querySelector("#qrImage");
      const defaultUrl = new URL("index.html", location.href).href;

      function updateQr() {
        const value = input.value.trim() || defaultUrl;
        image.src = "https://api.qrserver.com/v1/create-qr-code/?size=600x600&margin=16&data=" + encodeURIComponent(value);
      }

      input.value = defaultUrl;
      input.addEventListener("input", updateQr);
      updateQr();
    </script>
  </body>
</html>
